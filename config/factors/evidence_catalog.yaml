# Evidence Catalog
# Evidence records for sources, factors, and blocks

evidence:
  - evidence_id: ev_sqx_b143_overview
    source_id: sqx_b143
    evidence_type: white_paper
    evidence_level: E0
    description: StrategyQuant X B143 White Paper - overview of strategy generation framework
    url: https://strategyquant.com/b143
    date: "2025-01-01"
    status: pending
    validation_status: pending
    notes: Initial white paper, no independent validation

  - evidence_id: ev_qlib_alpha158_ic
    source_id: qlib_alpha158
    evidence_type: backtest
    evidence_level: E2
    description: Qlib Alpha158 factor IC test on CSI300 2015-2023
    url: https://github.com/microsoft/qlib/tree/main/examples/benchmarks
    date: "2023-06-01"
    status: validated
    validation_status: passed
    metrics:
      - metric_name: ic_mean
        value: 0.035
        period: "2015-01-01 to 2023-06-01"
      - metric_name: ic_std
        value: 0.12
        period: "2015-01-01 to 2023-06-01"
    notes: IC mean 3.5%, ICIR ~0.29, standard benchmark

  - evidence_id: ev_aqr_quality_paper
    source_id: aqr_quality
    evidence_type: academic_paper
    evidence_level: E1
    description: AQR Quality Minus Junk paper - cross-sectional quality factor
    url: https://www.aqr.com/Insights/Research/Working-Paper/Quality-Minus-Junk
    date: "2013-01-01"
    status: validated
    validation_status: pending
    notes: US market evidence, A-share replication pending

