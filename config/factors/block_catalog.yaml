  - block_id: wyckoff_spring_test
    block_type: signal
    name: Wyckoff Spring Test
    name_en: Wyckoff Spring Test
    description: Price briefly breaks support then quickly recovers, identifying accumulation spring
    input_factor_types:
      - numeric
    parameters:
      support_lookback:
        name: support_lookback
        param_type: integer
        description: Support line lookback period
        required: true
        range_min: 10
        range_max: 60
        default: 20
      retrace_pct:
        name: retrace_pct
        param_type: float
        description: Max percentage below support
        required: true
        range_min: 0.01
        range_max: 0.05
        default: 0.03
    parameter_space:
      support_lookback:
        mode: range
        min: 20
        max: 40
        step: 5
      retrace_pct:
        mode: range
        min: 0.02
        max: 0.04
        step: 0.005
