# Block Catalog
# Canonical source_type per decision 0009

blocks:
  - block_id: signal_indicator_cross_threshold
    block_type: signal
    name: Indicator Cross Above Threshold
    name_en: Indicator Cross Above Threshold
    description: Trigger signal when any numeric factor crosses above threshold
    input_factor_types:
      - numeric
    parameters:
      factor_id:
        name: factor_id
        param_type: factor_ref
        description: Referenced factor ID
        required: true
        factor_scope:
          - technical
          - state
          - money_flow
      operator:
        name: operator
        param_type: enum
        description: Comparison operator
        required: true
        enum_values:
          - cross_up
          - cross_down
          - ">"
          - "<"
          - ">="
          - "<="
      threshold:
        name: threshold
        param_type: float
        description: Threshold value
        required: true
        range_min: -10.0
        range_max: 10.0
    parameter_space:
      threshold:
        mode: range
        min: -2.0
        max: 2.0
        step: 0.1
    weight: 1.0
    enabled: true
    required_tables:
      - daily_bars
    required_columns: []
    required_context:
      - none
    preview_support: fully_supported
    dsl_output: factor_threshold
    robustness_role: signal_timing
    market_scope:
      - A_SHARE
      - US_EQUITY
      - ETF
    status: validated
    version: "0.1.0"
    source_refs:
      - sqx_b143
    evidence_level: E2
    generation_weight: 1.0
    production_gate: candidate

  - block_id: signal_factor_cross
    block_type: signal
    name: Factor Golden Cross
    name_en: Factor Golden Cross
    description: Trigger when factor_a crosses above factor_b
    input_factor_types:
      - numeric
    parameters:
      factor_a:
        name: factor_a
        param_type: factor_ref
        required: true
      factor_b:
        name: factor_b
        param_type: factor_ref
        required: true
    parameter_space: {}
    weight: 1.0
    enabled: true
    required_tables:
      - daily_bars
    required_context:
      - none
    preview_support: fully_supported
    dsl_output: factor_cross
    market_scope:
      - A_SHARE
      - ETF
    status: validated
    version: "0.1.0"
    source_refs:
      - sqx_b143
    evidence_level: E2
    generation_weight: 1.0
    production_gate: candidate

  - block_id: entry_breakout
    block_type: entry
    name: Breakout Entry
    name_en: Breakout Entry
    description: Enter when price breaks N-day high with volume expansion
    input_factor_types:
      - numeric
      - boolean
    input_factor_refs:
      - close
      - high
      - volume
    parameters:
      lookback:
        name: lookback
        param_type: integer
        description: Lookback period
        required: true
        range_min: 5
        range_max: 60
        default: 20
      volume_multiplier:
        name: volume_multiplier
        param_type: float
        description: Volume multiplier
        required: true
        range_min: 1.0
        range_max: 3.0
        default: 1.5
    parameter_space:
      lookback:
        mode: range
        min: 10
        max: 60
        step: 5
      volume_multiplier:
        mode: range
        min: 1.0
        max: 3.0
        step: 0.25
    weight: 1.0
    enabled: true
    required_tables:
      - daily_bars
    required_columns:
      - close
      - high
      - volume
    required_context:
      - none
    preview_support: fully_supported
    dsl_output: block_entry
    robustness_role: entry_timing
    market_scope:
      - A_SHARE
      - US_EQUITY
    status: candidate
    version: "0.1.0"
    source_refs:
      - sqx_b143
      - minervini_vcp
    methodology_refs:
      - minervini_vcp
    evidence_level: E1
    generation_weight: 0.8
    production_gate: blocked

  - block_id: exit_fixed_stop_loss
    block_type: exit
    name: Fixed Stop Loss Exit
    name_en: Fixed Stop Loss Exit
    description: Exit when price falls below entry price by fixed percentage
    input_factor_types:
      - numeric
    parameters:
      stop_pct:
        name: stop_pct
        param_type: float
        description: Stop loss percentage
        required: true
        range_min: 0.01
        range_max: 0.5
        default: 0.08
    parameter_space:
      stop_pct:
        mode: range
        min: 0.05
        max: 0.15
        step: 0.01
    weight: 1.0
    enabled: true
    required_tables:
      - daily_bars
    required_columns:
      - close
    required_context:
      - backtest
    preview_support: partial
    dsl_output: block_exit
    robustness_role: risk_control
    market_scope:
